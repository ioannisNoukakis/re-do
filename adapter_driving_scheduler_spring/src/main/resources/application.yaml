spring:
  application:
    name: Scheduler Primary Spring Adapter
  rabbitmq:
    host: localhost
    port: 5672
    username: root
    password: example
  mongodb:
    host: localhost
    port: 27017
    database: scheduler
    username: root
    password: example
    authentication-database: admin
  servlet:
    multipart:
      max-file-size: 500MB
      max-request-size: 500MB

scheduler:
  max-failures-before-giving-up: 3
  messaging: # Either "in-memory" or "rabbitmq"
    mode: "in-memory"
  persistence: # Either "in-memory" or "mongodb"
    mode: "in-memory"
  rabbitmq:
    task-exchange: "teg.tasks"
    reply-exchange: "teg.results"
    reply-queue: "teg.scheduler.updates"           # queue where runners send results back
    reply-routing-key: "#"                         # catch-all from the results exchange
    dead-letter-exchange: "teg.scheduler.dead-letter"
    dead-letter-routing-key: "scheduler.dead-letter"
  mongodb:
    cursor-batch-size-for-get-all-teg-not-events: 100
    teg-event-lookback-duration: 30d
  file-storage: # Either "in-memory" or "s3"
    mode: "in-memory"
    s3:
      endpoint: "http://localhost:9000"
      bucket: "scheduler-files"
      access-key: "root"
      secret-key: "example"
      region: "us-east-1"
  file-reference-store: # Either "in-memory" or "mongodb"
    mode: "in-memory"
  mutual-exclusion-lock:
    mode: "mongodb" # Either "in-memory" or "mongodb"
    retry-interval: 500ms
    timeout: 30s
