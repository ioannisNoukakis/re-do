services:
  rabbitMQ:
    image: rabbitmq:3-management
    container_name: redo-rabbitmq-dev
    environment:
      - RABBITMQ_DEFAULT_USER=root
      - RABBITMQ_DEFAULT_PASS=example
    ports:
      - "5672:5672"
      - "5050:15672"
  mongoDB:
    image: mongo:7.0.31
    container_name: redo-mongodb-dev
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    environment:
      - MONGO_INITDB_ROOT_USERNAME=root
      - MONGO_INITDB_ROOT_PASSWORD=example
volumes:
    mongo-data: